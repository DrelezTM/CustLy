<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Link Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .minimal-input { transition: all 0.2s ease; }
        .minimal-input:focus { outline: none; box-shadow: 0 0 0 2px black; border-color: transparent; }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .toast-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <header class="pt-12 pb-8 flex justify-center fade-in">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-lg">
                <span class="text-white font-bold text-lg">/</span>
            </div>
            <span class="font-semibold text-xl tracking-tight">Link Manager</span>
        </div>
    </header>

    <main class="flex-1 flex items-start justify-center px-6 fade-in">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 md:p-10 {% if error %}shake{% endif %}">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-light text-gray-900 mb-2">Create an account</h1>
                    <p class="text-gray-500 text-sm">Sign up to start managing your links</p>
                </div>

                {% if error %}
                <div id="errorAlert" class="toast-enter mb-6 bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-3">
                    <div class="flex-shrink-0 w-8 h-8 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-sm font-semibold text-red-900 mb-1">Registration failed</h3>
                        <p class="text-sm text-red-700">{{ error }}</p>
                    </div>
                    <button onclick="dismissError()" class="text-red-400 hover:text-red-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                {% endif %}

                <form method="POST" class="space-y-5" id="registerForm">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">Full Name</label>
                        <input 
                            type="text" 
                            name="name" 
                            id="nameInput"
                            value="{{ form_data.name if form_data else '' }}"
                            placeholder="John Doe" 
                            required
                            class="minimal-input w-full pl-4 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent focus:bg-white"
                        >
                        <p id="nameError" class="text-xs text-red-600 hidden">Name is required</p>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">Email address</label>
                        <input 
                            type="email" 
                            name="email" 
                            id="emailInput"
                            value="{{ form_data.email if form_data else '' }}"
                            placeholder="name@example.com" 
                            required
                            class="minimal-input w-full pl-4 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent focus:bg-white"
                        >
                        <p id="emailError" class="text-xs text-red-600 hidden">Please enter a valid email address</p>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">Password</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                name="password" 
                                id="passwordInput"
                                placeholder="••••••••" 
                                required
                                class="minimal-input w-full pl-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent focus:bg-white"
                            >

                            <button 
                                type="button" 
                                onclick="togglePassword()"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors"
                            >
                                <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                                <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                                </svg>
                            </button>
                        </div>
                        <p id="passwordError" class="text-xs text-red-600 hidden">Password must be at least 6 characters</p>
                    </div>

                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full bg-black text-white font-medium py-3.5 px-6 rounded-xl hover:bg-gray-800 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group disabled:opacity-50 disabled:cursor-not-allowed mt-6"
                    >
                        <span id="btnText">Register</span>
                    </button>

                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500">Or</span>
                    </div>
                </div>

                <div class="text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account? 
                        <a href="/login" class="font-medium text-black hover:underline transition-all">Sign in</a>
                    </p>
                </div>
            </div>

            <div class="mt-8 text-center">
                <p class="text-xs text-gray-400">
                    Made with ❤️ by 
                    <a href="https://www.yazidyusuf.my.id" class="hover:text-gray-600 underline">@DrelezTM</a>
                </p>
            </div>

        </div>
    </main>

    <script>
        function dismissError() {
            const alert = document.getElementById('errorAlert');
            if (alert) { alert.style.opacity = '0'; alert.style.transform = 'translateY(-10px)'; setTimeout(() => alert.remove(), 300); }
        }
        setTimeout(dismissError, 5000);

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeOffIcon = document.getElementById('eyeOffIcon');
            if (input.type === 'password') { input.type = 'text'; eyeIcon.classList.add('hidden'); eyeOffIcon.classList.remove('hidden'); }
            else { input.type = 'password'; eyeIcon.classList.remove('hidden'); eyeOffIcon.classList.add('hidden'); }
        }

        function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

        document.getElementById('emailInput').addEventListener('blur', function() {
            const email = this.value.trim(); const errorEl = document.getElementById('emailError');
            if (email && !isValidEmail(email)) { errorEl.classList.remove('hidden'); this.classList.add('border-red-300'); } 
            else { errorEl.classList.add('hidden'); this.classList.remove('border-red-300'); }
        });

        document.getElementById('passwordInput').addEventListener('blur', function() {
            const pw = this.value.trim(); const errorEl = document.getElementById('passwordError');
            if (pw && pw.length < 6) { errorEl.classList.remove('hidden'); this.classList.add('border-red-300'); } 
            else { errorEl.classList.add('hidden'); this.classList.remove('border-red-300'); }
        });

        document.getElementById('nameInput').addEventListener('blur', function() {
            const name = this.value.trim(); const errorEl = document.getElementById('nameError');
            if (!name) { errorEl.classList.remove('hidden'); this.classList.add('border-red-300'); } 
            else { errorEl.classList.add('hidden'); this.classList.remove('border-red-300'); }
        });

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                this.classList.remove('border-red-300', 'focus:ring-red-500');
                const errorId = this.id.replace('Input','Error');
                const errorEl = document.getElementById(errorId);
                if (errorEl) errorEl.classList.add('hidden');
            });
        });
    </script>

</body>
</html>
