<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Link Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .glitch-hover:hover {
            animation: glitch 0.3s ease-in-out;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <header class="pt-12 pb-6 flex justify-center fade-in">
        <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-lg">
                <span class="text-white font-bold text-lg">/</span>
            </div>
            <span class="font-semibold text-xl tracking-tight">Link Manager</span>
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 fade-in">        
        <div class="w-full max-w-lg text-center">
            <div class="mb-8 relative">
                <div class="absolute inset-0 flex items-center justify-center opacity-5">
                    <div class="w-64 h-64 bg-black rounded-full blur-3xl"></div>
                </div>
                
                <h1 class="text-9xl font-light text-gray-900 float glitch-hover select-none relative z-10">
                    404
                </h1>
            </div>

            <h2 class="text-2xl font-light text-gray-900 mb-3">Page not found</h2>
            <p class="text-gray-500 text-sm mb-8 max-w-sm mx-auto leading-relaxed">
                The page you're looking for doesn't exist or has been moved. Check the URL or go back home.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
                <a 
                    href="/" 
                    class="w-full sm:w-auto bg-black text-white font-medium py-3 px-8 rounded-xl hover:bg-gray-800 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group"
                >
                    <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    <span>Go Home</span>
                </a>

                <a 
                    href="/add" 
                    class="w-full sm:flex-1 max-w-[200px] bg-white text-gray-700 font-medium py-3 px-6 rounded-xl border border-gray-200 hover:bg-gray-50 hover:border-gray-300 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span>Create Link</span>
                </a>
            </div>

            <div class="mt-12 pt-8 border-t border-gray-200">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-4">Popular pages</p>
                <div class="flex flex-wrap items-center justify-center gap-4 text-sm">
                    <a href="/" class="text-gray-600 hover:text-black transition-colors">Dashboard</a>
                    <span class="text-gray-300">•</span>
                    <a href="/add" class="text-gray-600 hover:text-black transition-colors">New Link</a>
                    <span class="text-gray-300">•</span>
                    <a href="/login" class="text-gray-600 hover:text-black transition-colors">Login</a>
                </div>
            </div>

        </div>

    </main>

    <footer class="py-6 text-center">
        <p class="text-xs text-gray-400">
            Error code: 404 • <span id="timestamp"></span>
        </p>
    </footer>

    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString('id-ID', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });

        let konamiCode = [];
        const konamiPattern = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        
        document.addEventListener('keydown', (e) => {
            konamiCode.push(e.key);
            konamiCode = konamiCode.slice(-10);
            
            if (konamiCode.join(',') === konamiPattern.join(',')) {
                document.body.style.filter = 'invert(1)';
                setTimeout(() => {
                    document.body.style.filter = '';
                }, 1000);
            }
        });
    </script>

</body>
</html>
